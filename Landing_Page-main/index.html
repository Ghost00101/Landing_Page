<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja - Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Loja do mudinho</h1>
        <p>Produtos em destaque</p>
    </header>

    <main>
        <!-- Primeira linha - 3 produtos -->
        <div class="produtos-linha">
            <div class="produto">
                <img src="https://picsum.photos/id/20/300/300" alt="Fone de Ouvido">
                <h3>Fone Bluetooth</h3>
                <p class="preco">R$ 129,90</p>
                <button>Adicionar ao carrinho</button>
            </div>

            <div class="produto">
                <img src="https://picsum.photos/id/201/300/300" alt="Relógio">
                <h3>Relógio Smart</h3>
                <p class="preco">R$ 299,90</p>
                <button>Adicionar ao carrinho</button>
            </div>

            <div class="produto">
                <img src="https://picsum.photos/id/237/300/300" alt="Garrafa">
                <h3>Garrafa Térmica</h3>
                <p class="preco">R$ 89,90</p>
                <button>Adicionar ao carrinho</button>
            </div>
        </div>

        <!-- Segunda linha - 3 produtos -->
        <div class="produtos-linha">
            <div class="produto">
                <img src="https://picsum.photos/id/180/300/300" alt="Mochila">
                <h3>Mochila Impermeável</h3>
                <p class="preco">R$ 159,90</p>
                <button>Adicionar ao carrinho</button>
            </div>

            <div class="produto">
                <img src="https://picsum.photos/id/251/300/300" alt="Tênis">
                <h3>Tênis Casual</h3>
                <p class="preco">R$ 219,90</p>
                <button>Adicionar ao carrinho</button>
            </div>

            <div class="produto">
                <img src="https://picsum.photos/id/133/300/300" alt="Câmera">
                <h3>Câmera Instantânea</h3>
                <p class="preco">R$ 449,90</p>
                <button>Adicionar ao carrinho</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; Loja do wagner</p>
    </footer>
</body>
</html>
